apiVersion: v1
kind: Service
metadata:
  name: {{ include "any-chat-gradio.fullname" . }}
  labels:
    {{- include "any-chat-gradio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "any-chat-gradio.selectorLabels" . | nindent 4 }}